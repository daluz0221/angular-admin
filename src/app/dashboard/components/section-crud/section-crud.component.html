<section class="max-w-5xl mx-auto">
  <header class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-6">
    <div>
      <h1 class="text-lg font-semibold text-slate-900">{{ title() }}</h1>
      
    </div>
    <div class="flex flex-wrap gap-2">
      <button
        type="button"
        class="inline-flex items-center rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2"
        (click)="createClick.emit()"
      >
        Crear nuevo
      </button>
     
    </div>
  </header>

  <ng-content></ng-content>
</section>
