<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/50">
  <div class="w-full max-w-lg rounded-xl bg-white shadow-xl border border-slate-200">
    <header class="px-4 py-3 border-b border-slate-200 flex justify-between items-center">
      <h2 class="text-sm font-semibold text-slate-900">
        {{ title }}
      </h2>
      <button
        type="button"
        class="inline-flex h-8 w-8 items-center justify-center rounded-full text-slate-500 hover:bg-slate-100 hover:text-slate-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-300 focus-visible:ring-offset-1"
        (click)="onCancel()"
        aria-label="Cerrar"
      >
        ✕
      </button>
    </header>

    <section class="px-4 py-4">
      <ng-content></ng-content>
    </section>

    <footer class="px-4 py-3 border-t border-slate-200 flex justify-end gap-2">
      <button
        type="button"
        class="inline-flex items-center rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-300 focus-visible:ring-offset-1"
        (click)="onCancel()"
      >
        Cancelar
      </button>
      <button
        type="button"
        class="inline-flex items-center rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-indigo-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2"
        (click)="onConfirm()"
      >
        {{ confirmLabel }}
      </button>
    </footer>
  </div>
</div>
