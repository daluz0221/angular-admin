<div class="w-full max-w-md">
  <!-- Marca en móvil -->
  <div class="flex justify-center md:justify-start mb-8">
    <div class="inline-flex h-13 w-13 items-center justify-center rounded-xl bg-indigo-500 text-sm font-semibold text-white md:hidden">
      Admin
    </div>
  </div>

  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <!-- Cabecera del card -->
    <div class="border-b border-slate-200 bg-slate-50/80 px-6 py-5">
      <h2 class="text-lg font-semibold text-slate-900">Iniciar sesión</h2>
      <p class="mt-1 text-sm text-slate-500">
        Introduce tus credenciales para acceder al panel.
      </p>
    </div>

    <form class="p-6 space-y-5" (ngSubmit)="onSubmit()">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">
          Correo electrónico
        </label>
        <input
          id="email"
          type="email"
          name="email"
          autocomplete="email"
          placeholder="admin@ejemplo.com"
          class="block w-full rounded-lg border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 placeholder-slate-400 shadow-sm transition-colors focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20"
        />
      </div>

      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label for="password" class="block text-sm font-medium text-slate-700">
            Contraseña
          </label>
          <a
            href="#"
            class="text-xs font-medium text-indigo-600 hover:text-indigo-500 focus:outline-none focus:underline"
          >
            ¿Olvidaste tu contraseña?
          </a>
        </div>
        <input
          id="password"
          type="password"
          name="password"
          autocomplete="current-password"
          placeholder="••••••••"
          class="block w-full rounded-lg border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 placeholder-slate-400 shadow-sm transition-colors focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20"
        />
      </div>

      <button
        type="submit"
        class="w-full inline-flex items-center justify-center rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-indigo-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-indigo-500 focus-visible:ring-offset-2 transition-colors"
      >
        Iniciar sesión
      </button>
    </form>

    <div class="border-t border-slate-200 bg-slate-50/50 px-6 py-4">
      <p class="text-xs text-slate-500 text-center">
        Al continuar, aceptas los términos de uso del panel administrativo.
      </p>
    </div>
  </div>

  <!-- Enlace al panel (opcional, para desarrollo) -->
  <p class="mt-6 text-center">
    <a
      [routerLink]="['/admin']"
      class="text-sm font-medium text-slate-500 hover:text-indigo-600 transition-colors"
    >
      Ir al panel sin sesión →
    </a>
  </p>
</div>
