<div class="w-full max-w-md">
  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
    <div class="border-b border-slate-200 bg-slate-50/80 px-6 py-5">
      <h2 class="text-lg font-semibold text-slate-900">Cambiar contraseña</h2>
      <p class="mt-1 text-sm text-slate-500">
        Es la primera vez que ingresas. Elige una contraseña nueva para continuar.
      </p>
    </div>

    <form class="p-6 space-y-5" [formGroup]="form" (ngSubmit)="onSubmit()">
      @if (errorMessage) {
        <p class="text-sm text-red-600">{{ errorMessage }}</p>
      }
      @if (successMessage) {
        <p class="text-sm text-green-600">{{ successMessage }}</p>
      }

      <div>
        <label for="new_password" class="block text-sm font-medium text-slate-700 mb-1.5">
          Nueva contraseña
        </label>
        <input
          id="new_password"
          type="password"
          formControlName="new_password"
          autocomplete="new-password"
          placeholder="••••••••"
          class="block w-full rounded-lg border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 placeholder-slate-400 shadow-sm"
        />
      </div>

      <div>
        <label for="confirm_password" class="block text-sm font-medium text-slate-700 mb-1.5">
          Confirmar contraseña
        </label>
        <input
          id="confirm_password"
          type="password"
          formControlName="confirm_password"
          autocomplete="new-password"
          placeholder="••••••••"
          class="block w-full rounded-lg border border-slate-300 bg-white px-3.5 py-2.5 text-sm text-slate-900 placeholder-slate-400 shadow-sm"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full inline-flex justify-center rounded-lg bg-indigo-600 px-4 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-indigo-500 disabled:opacity-50"
      >
        {{ loading() ? 'Guardando…' : 'Guardar contraseña' }}
      </button>
    </form>
  </div>
</div>
